# Deploy Flutter Web to GitHub Pages (project site: https://<user>.github.io/<repo>/)
# One-time: Repo Settings -> Pages -> Build and deployment -> Source: GitHub Actions

name: Deploy Web to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 在仓库 Settings -> Secrets and variables -> Actions 添加 SUPABASE_URL、SUPABASE_ANON_KEY
      # 与本地 app.env 一致（anon key 可进前端）；未配置时 Web 不启用云端与登录跳转
      - name: Build web (base-href matches repo name)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          REPO="${GITHUB_REPOSITORY##*/}"
          # 默认从 gstatic 拉 CanvasKit；国内等网络易白屏，改为随站点一同部署
          flutter build web --release --base-href="/${REPO}/" --no-web-resources-cdn \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

      # 子路径 + Service Worker 易留下旧 main.dart.js / 旧 CanvasKit 策略，表现为长期白屏；线上直出静态即可
      - name: 去掉 flutter_bootstrap 中的 Service Worker 注册
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          p = Path("build/web/flutter_bootstrap.js")
          s = p.read_text(encoding="utf-8")
          pat = r"_flutter\.loader\.load\(\{\s*serviceWorkerSettings:\s*\{[^}]*\}\s*\}\);"
          new, n = re.subn(pat, "_flutter.loader.load({});", s, count=1)
          if n != 1:
              raise SystemExit(f"expected 1 replacement in flutter_bootstrap.js, got {n}")
          p.write_text(new, encoding="utf-8")
          PY

      - name: SPA 404 (same as index.html)
        run: cp build/web/index.html build/web/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
